<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Public_Sans:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#191b22",
                        "on-secondary-container": "#007070",
                        "background": "#faf8ff",
                        "inverse-on-surface": "#f0f0fa",
                        "secondary-container": "#8cf3f3",
                        "surface-tint": "#0056d2",
                        "primary-fixed": "#dae2ff",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#002020",
                        "primary-container": "#0056d2",
                        "on-secondary-fixed-variant": "#004f4f",
                        "tertiary-container": "#b12f00",
                        "surface-container-high": "#e7e7f1",
                        "inverse-surface": "#2e3038",
                        "on-error": "#ffffff",
                        "surface-variant": "#e1e2ec",
                        "on-surface-variant": "#424654",
                        "tertiary": "#882200",
                        "on-tertiary-container": "#ffcfc1",
                        "secondary-fixed": "#8cf3f3",
                        "on-secondary": "#ffffff",
                        "secondary": "#006a6a",
                        "surface-container": "#ededf7",
                        "on-background": "#191b22",
                        "surface": "#faf8ff",
                        "on-primary-container": "#ccd8ff",
                        "inverse-primary": "#b2c5ff",
                        "tertiary-fixed-dim": "#ffb5a0",
                        "surface-dim": "#d9d9e3",
                        "outline-variant": "#c3c6d6",
                        "outline": "#737785",
                        "primary-fixed-dim": "#b2c5ff",
                        "tertiary-fixed": "#ffdbd1",
                        "on-tertiary-fixed-variant": "#872100",
                        "on-tertiary-fixed": "#3b0900",
                        "surface-container-highest": "#e1e2ec",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f2f3fd",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#001847",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#0040a1",
                        "surface-bright": "#faf8ff",
                        "secondary-fixed-dim": "#6fd7d6",
                        "primary": "#0040a1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Public Sans"],
                        "label": ["Public Sans"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
    <!-- Navigation -->
    <header
        class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-[0px_12px_32px_rgba(25,27,34,0.04)] h-20">
        <nav class="flex justify-between items-center px-8 h-full w-full mx-auto">
            <div class="flex items-center gap-12">
                <div class="text-xl font-bold tracking-tighter text-blue-800 dark:text-blue-200 font-headline">The
                    Guardian</div>
                <div class="hidden md:flex items-center gap-8"><a
                        class="text-slate-600 font-medium hover:text-blue-500 transition-colors" href="#">Inicio</a><a
                        class="text-primary font-bold transition-colors border-b-2 border-primary pb-1" href="#">Prueba
                        de seguridad</a></div>
            </div>
            <div class="flex items-center gap-4">
                <div
                    class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
                    <span class="material-symbols-outlined text-outline">account_circle</span></div>
            </div>
        </nav>
    </header>
    <!-- Main Content: Success Message -->
    <main class="flex-grow flex items-center justify-center px-6 pt-20 pb-20">
        <h1
            class="font-headline text-5xl md:text-7xl lg:text-8xl font-extrabold text-on-surface tracking-tight leading-tight text-center max-w-5xl">
            ¡Enhorabuena! <br /> Tienes una <span class="text-primary">contraseña fuerte</span>
        </h1>
    </main>
    <!-- Footer -->
    <footer class="bg-surface-container-lowest border-t border-outline-variant/20 py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-lg font-bold text-primary font-headline tracking-tighter">El Camino del Guardián</div>
            <div class="flex flex-wrap justify-center gap-8 text-sm text-on-surface-variant">
                <a class="hover:text-primary transition-colors" href="#">Privacidad</a>
                <a class="hover:text-primary transition-colors" href="#">Términos de Servicio</a>
                <a class="hover:text-primary transition-colors" href="#">Reglas del Guardián</a>
            </div>
            <div class="text-xs text-outline font-medium uppercase tracking-widest">© 2024 The Guardian's Path</div>
        </div>
    </footer>
</body>

</html>
