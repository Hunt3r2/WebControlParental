<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Guardian - Resultado</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Public+Sans:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/assets/js/tailwind-config.js">
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .tonal-shift-no-borders {
            transition: background-color 0.3s ease;
        }

        .tonal-transition {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>

    <main class="flex-grow flex items-center justify-center pt-24 px-6 bg-surface-container-lowest">
        <div class="max-w-4xl w-full text-center py-20">
            <div class="mb-8 flex justify-center">
                <div
                    class="w-24 h-24 bg-secondary-container rounded-full flex items-center justify-center text-on-secondary-container">
                    <span class="material-symbols-outlined text-5xl"
                        style="font-variation-settings: 'FILL' 1;">verified_user</span>
                </div>
            </div>
            <h1
                class="font-headline text-5xl md:text-7xl font-extrabold text-on-surface tracking-tighter leading-tight mb-6">
                ¡Enhorabuena!
            </h1>
            <p class="font-headline text-2xl md:text-3xl font-semibold text-primary tracking-tight">
                Has superado la prueba de Phishing
            </p>
            <div class="mt-16 flex flex-col md:flex-row gap-6 justify-center">
                <div
                    class="p-8 bg-surface-container-low rounded-xl text-left max-w-xs transition-all hover:shadow-[0px_12px_32px_rgba(25,27,34,0.05)] border-l-4 border-secondary">
                    <span class="material-symbols-outlined text-secondary mb-4">visibility</span>
                    <h3 class="font-headline font-bold text-on-surface mb-2">Detección Precisa</h3>
                    <p class="text-on-surface-variant text-sm leading-relaxed">Has identificado correctamente las
                        señales de alerta y mantenido tu entorno seguro.</p>
                </div>
                <div
                    class="p-8 bg-surface-container-low rounded-xl text-left max-w-xs transition-all hover:shadow-[0px_12px_32px_rgba(25,27,34,0.05)] border-l-4 border-primary">
                    <span class="material-symbols-outlined text-primary mb-4">school</span>
                    <h3 class="font-headline font-bold text-on-surface mb-2">Santuario Digital</h3>
                    <p class="text-on-surface-variant text-sm leading-relaxed">Tu conocimiento es la primera línea de
                        defensa para proteger a los más vulnerables.</p>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-container"></div>
    <script src="../../../../assets/js/main.js"></script>
    <script src="../../../../assets/js/navbar.js"></script>
</body>

</html>
